<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☁️ 𝓝𝓪𝓽𝓽 ☁️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --red:   #CC0000;
  --red2:  #FF1A1A;
  --white: #F2F2F2;
  --dim:   rgba(255,255,255,0.45);
  --border:rgba(255,255,255,0.09);
  --card:  rgba(10,10,10,0.52);
}

html,body{
  width:100vw;height:100vh;
  overflow:hidden;background:#000;
  font-family:'Inter',sans-serif;
  user-select:none;cursor:default;
}

/* ── VIDEO ── */
#bgVideo{
  position:fixed;inset:0;z-index:0;
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity .7s;
}
#bgVideo.show{opacity:1;}

/* ── OVERLAYS ── */
#darkOv{
  position:fixed;inset:0;z-index:1;
  background:#000;opacity:1;
  pointer-events:none;transition:opacity 1.2s;
}

/* card always same bg — not affected by dark overlay */

/* subtle grain */
#noise{
  position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;animation:grain .4s steps(1) infinite;
}
@keyframes grain{
  0%{background-position:0 0}25%{background-position:-40px 25px}
  50%{background-position:15px -35px}75%{background-position:-25px 50px}
}

/* ── START SCREEN ── */
#startScreen{
  position:fixed;inset:0;z-index:300;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
  background:#000;transition:opacity .7s;
}
#startScreen.hidden{opacity:0;pointer-events:none;}

.start-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(64px,14vw,130px);
  letter-spacing:.14em;color:#fff;
  text-shadow:3px 3px 0 var(--red),0 0 40px rgba(200,0,0,.4);
  animation:startglitch 4s infinite;
}
@keyframes startglitch{
  0%,90%,100%{text-shadow:3px 3px 0 var(--red),0 0 40px rgba(200,0,0,.35);}
  91%{text-shadow:-3px 3px 0 var(--red),3px -3px 0 rgba(200,0,0,.5);transform:translate(2px,0);}
  92%{text-shadow:3px -3px 0 var(--red),-3px 3px 0 rgba(200,0,0,.5);transform:translate(-2px,0);}
  93%{text-shadow:3px 3px 0 var(--red);transform:translate(0);}
}
.start-hint{
  font-size:11px;letter-spacing:.38em;text-transform:uppercase;
  color:rgba(255,255,255,.3);
  animation:blink 1.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.9}}

/* ── CANVAS (fragments) ── */
#fragCanvas{
  position:fixed;inset:0;z-index:11;
  pointer-events:none;display:none;
}

/* ── PROFILE WRAPPER ── */
/* z-index 15 = above darkOv so card appearance never changes with overlay */
#profileWrap{
  position:fixed;inset:0;z-index:15;
  display:none;align-items:center;justify-content:center;
  opacity:0;transition:opacity .35s;
}
#profileWrap.visible{opacity:1;}
#profileWrap.smoothIn{animation:smoothIn .85s cubic-bezier(.22,.68,0,1.18) forwards;}
@keyframes smoothIn{
  0%  {opacity:0;transform:scale(.91) translateY(22px);filter:blur(10px);}
  45% {opacity:1;transform:scale(1.03) translateY(-3px);filter:blur(0);}
  68% {transform:scale(.985) translateY(2px);}
  84% {transform:scale(1.008);}
  100%{opacity:1;transform:scale(1) translateY(0);}
}

/* ── CARD ── */
.card{
  position:relative;
  width:clamp(270px,82vw,340px);
  /* ultra transparent — just a whisper of dark + tiny blur */
  background:rgba(0,0,0,0.10);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  border-radius:22px;
  /* subtle white outline only */
  border:1px solid rgba(255,255,255,0.13);
  padding:24px 20px 18px;
  /* no heavy shadow — let the video breathe through */
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
  isolation:isolate;
}
/* thin red accent line at very top */
.card::before{
  content:'';
  position:absolute;top:0;left:18px;right:18px;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--red) 40%,var(--red) 60%,transparent);
  border-radius:2px;
}

/* ── AVATAR ── */
.av-wrap{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:10px;
}
.av-img{
  width:80px;height:80px;border-radius:50%;
  /* red ring border, matching the screenshot */
  border:2px solid var(--red);
  object-fit:cover;display:block;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.av-placeholder{
  width:80px;height:80px;border-radius:50%;
  border:2px solid var(--red);
  background:rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
}

/* ── USERNAME + BIO ── */
.username{
  margin-top:9px;text-align:center;
  font-size:clamp(14px,4vw,18px);
  font-weight:600;color:#fff;
  letter-spacing:.02em;line-height:1.35;
}
.bio{
  text-align:center;
  font-size:11px;color:rgba(255,255,255,.5);
  margin-top:5px;letter-spacing:.04em;
}

/* ── DIVIDER ── */
.divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  margin:12px 0;
}

/* ── META ROW ── */
.meta-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
  font-size:10px;color:rgba(255,255,255,.45);
}
.meta-item{display:flex;align-items:center;gap:4px;}
.meta-item b{color:rgba(255,255,255,.85);font-weight:700;}

/* ── MUSIC PLAYER — guns.lol style, no album art box ── */
.player{ margin-bottom:12px; }

.player-top-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:4px;
}
.track-name{
  font-size:12px;font-weight:700;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;
}
.play-btn{
  background:none;border:none;cursor:pointer;
  color:#fff;font-size:16px;line-height:1;
  padding:0;margin-left:10px;
  opacity:.8;flex-shrink:0;
  transition:opacity .15s,transform .15s;
}
.play-btn:hover{opacity:1;transform:scale(1.15);}

.track-artist{
  font-size:9px;color:rgba(255,255,255,.4);
  margin-bottom:7px;
  display:flex;align-items:center;gap:4px;
}

/* progress bar — full width, thin white */
.progress-wrap{
  width:100%;height:2px;
  background:rgba(255,255,255,.15);
  border-radius:2px;cursor:pointer;
}
.progress-fill{
  height:100%;width:0%;
  background:#fff;
  border-radius:2px;pointer-events:none;
  transition:width .3s linear;
}
.progress-times{
  display:flex;justify-content:space-between;
  font-size:8px;color:rgba(255,255,255,.25);margin-top:3px;
}

/* ── SOCIALS — flat white floating icons, no box ── */
.socials{
  display:flex;justify-content:center;align-items:center;gap:22px;
  margin-top:2px;
}
.social-btn{
  display:flex;align-items:center;justify-content:center;
  width:30px;height:30px;
  text-decoration:none;
  opacity:.65;
  filter:brightness(0) invert(1);
  transition:opacity .2s,transform .2s;
}
.social-btn:hover{opacity:1;transform:translateY(-3px);}
.social-btn svg{width:24px;height:24px;display:block;}

/* ── RIPPLE ── */
.ripple{
  position:fixed;border-radius:50%;
  border:1.5px solid rgba(204,0,0,.55);
  pointer-events:none;z-index:9;
  animation:rippleout .9s ease-out forwards;
}
@keyframes rippleout{0%{transform:scale(0);opacity:.8}100%{transform:scale(5);opacity:0}}
</style>
</head>
<body>

<video id="bgVideo" playsinline loop>
  <source src="bg.mp4" type="video/mp4">
</video>

<div id="darkOv"></div>
<div id="noise"></div>
<canvas id="fragCanvas"></canvas>

<!-- ── PROFILE ── -->
<div id="profileWrap">
  <div class="card" id="card">

    <!-- Avatar -->
    <div class="av-wrap">
      <img class="av-img" src="ta-pp.png" alt="pp"
           onerror="this.style.display='none';document.getElementById('avFallback').style.display='flex'">
      <div class="av-placeholder" id="avFallback" style="display:none">☁️</div>
      <div class="username">☁️ 𝓝𝓪𝓽𝓽 ☁️</div>
      <div class="bio">꧁ঔৣ☬✞𝓓𝖔𝖓✞☬ঔৣ꧂</div>
    </div>

    <div class="divider"></div>

    <!-- Meta -->
    <div class="meta-row">
      <div class="meta-item">👁 <b id="viewCount">69</b> views</div>
      <div class="meta-item">📍 France</div>
    </div>

    <!-- Player -->
    <div class="player">
      <div class="player-top-row">
        <div class="track-name">songtool</div>

      </div>

    </div>

    <!-- Socials — TikTok, Roblox, Spotify — guns.lol flat white style -->
    <div class="socials">

      <!-- TikTok -->
      <a class="social-btn" href="https://www.tiktok.com/@________nath________?_r=1&_t=ZN-94tsFv2xYdq" target="_blank" title="TikTok">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.95a8.16 8.16 0 0 0 4.77 1.52V7.01a4.85 4.85 0 0 1-1-.32z"/>
        </svg>
      </a>

      <!-- Roblox -->
      <a class="social-btn" href="https://www.roblox.com/fr/users/792982796/profile" target="_blank" title="Roblox">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M5.005 0L0 18.73 18.729 24 24 5.27zm9.386 13.952l-4.249-1.165 1.165-4.249 4.249 1.165z"/>
        </svg>

      <!-- Spotify -->
      <a class="social-btn" href="https://open.spotify.com/user/e6aadnuued62v51xwr6hr4m5x" target="_blank" title="Spotify">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
      </a>

    </div>
  </div>
</div>

<!-- ── START SCREEN ── -->
<div id="startScreen">
  <div class="start-name">NATT</div>
  <div class="start-hint">click anywhere to enter</div>
</div>

<script>
// ── Elements ──
const startEl   = document.getElementById('startScreen');
const profWrap  = document.getElementById('profileWrap');
const bgVideo   = document.getElementById('bgVideo');
const darkOv    = document.getElementById('darkOv');
const canvas    = document.getElementById('fragCanvas');
const ctx       = canvas.getContext('2d');
const playBtn   = document.getElementById('playBtn');
const progFill  = document.getElementById('progressFill');
const curTimeEl = document.getElementById('curTime');
const durTimeEl = document.getElementById('durTime');

let started = false, isPlaying = false, timers = [], fragAnimId = null;

// ── Canvas resize ──
function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

// ── Music ──
const music = new Audio('songtool.mp3');
music.loop = false; // we control looping with the video cycle

music.addEventListener('timeupdate', () => {
  if (!music.duration) return;
  progFill.style.width = (music.currentTime / music.duration * 100) + '%';
  curTimeEl.textContent = fmt(music.currentTime);
  durTimeEl.textContent = fmt(music.duration);
});

function fmt(s){ return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

function togglePlay(){
  if (music.paused){
    music.play();
    isPlaying = true;
    playBtn.textContent = '⏸';
  } else {
    music.pause();
    isPlaying = false;
    playBtn.textContent = '▶';
  }
}

function seekAudio(e){
  if (!music.duration) return;
  const r = document.getElementById('progressWrap').getBoundingClientRect();
  music.currentTime = ((e.clientX - r.left) / r.width) * music.duration;
}

// ── Start on click ──
document.addEventListener('click', function init(){
  if (started) return;
  started = true;
  document.removeEventListener('click', init);

  startEl.classList.add('hidden');
  setTimeout(() => startEl.style.display = 'none', 800);

  // Video
  bgVideo.muted = false;
  bgVideo.volume = 1;
  bgVideo.currentTime = 0;
  bgVideo.play().catch(() => { bgVideo.muted = true; bgVideo.play(); });
  bgVideo.classList.add('show');

  // Fade out dark overlay
  darkOv.style.opacity = '0';

  // Music auto-play
  music.currentTime = 0;
  music.play().then(() => {
    isPlaying = true;
    playBtn.textContent = '⏸';
  }).catch(() => {});

  // View count +1
  const vc = document.getElementById('viewCount');
  vc.textContent = parseInt(vc.textContent) + 1;

  // Wait for overlay to fully fade before showing profile
  // so backdrop-filter always sees the video, never the black bg
  setTimeout(() => {
    showProfile();
    beginTimeline();
  }, 1250);
});

// ── Show profile ──
function showProfile(){
  profWrap.classList.remove('smoothIn');
  void profWrap.offsetWidth;
  profWrap.style.display = 'flex';
  profWrap.classList.add('visible');
}

function showProfileSmooth(){
  profWrap.style.display = 'flex';
  profWrap.classList.remove('smoothIn', 'visible');
  void profWrap.offsetWidth;
  profWrap.classList.add('smoothIn', 'visible');
  spawnRipples();
}

function hideProfile(){
  profWrap.classList.remove('visible');
}

function spawnRipples(){
  const r = document.getElementById('card').getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  const sz = Math.max(r.width, r.height);
  [0, 170, 340].forEach(delay => {
    setTimeout(() => {
      const ring = document.createElement('div');
      ring.classList.add('ripple');
      ring.style.cssText = `left:${cx-sz/2}px;top:${cy-sz/2}px;width:${sz}px;height:${sz}px;`;
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 1100);
    }, delay);
  });
}

// ── Fragment explosion ──
function startFragments(){
  hideProfile();
  canvas.style.display = 'block';
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const card = document.getElementById('card');
  const r    = card.getBoundingClientRect();

  // Shard colors — black/white/red palette
  const COLS = [
    'rgba(242,242,242,0.9)',
    'rgba(200,200,200,0.8)',
    'rgba(204,0,0,0.85)',
    'rgba(255,26,26,0.7)',
    'rgba(100,100,100,0.7)',
    'rgba(255,255,255,0.6)',
    'rgba(180,0,0,0.6)',
  ];

  const shards = 30;
  const frags  = [];

  for (let i = 0; i < shards; i++){
    const ox = r.left  + Math.random() * r.width;
    const oy = r.top   + Math.random() * r.height;
    const pts = [];
    const numPts = 5 + Math.floor(Math.random() * 4);
    for (let a = 0; a < numPts; a++){
      const angle = (a / numPts) * Math.PI * 2 + Math.random() * 0.5;
      const rad   = 18 + Math.random() * 52;
      let px = ox + Math.cos(angle) * rad;
      let py = oy + Math.sin(angle) * rad;
      px = Math.max(r.left, Math.min(r.right,  px));
      py = Math.max(r.top,  Math.min(r.bottom, py));
      pts.push({x: px - ox, y: py - oy});
    }
    const angle2 = Math.random() * Math.PI * 2;
    const speed  = 1.8 + Math.random() * 5;
    frags.push({
      pts, cx: ox, cy: oy,
      vx: Math.cos(angle2) * speed,
      vy: Math.sin(angle2) * speed - 1.5,
      rot: 0,
      rotSpd: (Math.random() - .5) * .1,
      color: COLS[Math.floor(Math.random() * COLS.length)],
      life: 1,
      decay: 0.007 + Math.random() * 0.009,
    });
  }

  function drawFrame(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    frags.forEach(f => {
      if (f.life <= 0) return;
      alive = true;
      f.cx  += f.vx;
      f.cy  += f.vy;
      f.vy  += 0.15;
      f.rot += f.rotSpd;
      f.life -= f.decay;
      ctx.save();
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.translate(f.cx, f.cy);
      ctx.rotate(f.rot);
      ctx.beginPath();
      ctx.moveTo(f.pts[0].x, f.pts[0].y);
      f.pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
      ctx.closePath();
      ctx.fillStyle = f.color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = .8;
      ctx.stroke();
      ctx.restore();
    });
    if (alive) fragAnimId = requestAnimationFrame(drawFrame);
    else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.style.display = 'none';
    }
  }
  fragAnimId = requestAnimationFrame(drawFrame);
}

// ── Timeline ──
// Video is 32s. Profile shown 0→9.5s, explode at 9.5s, reappear at 21.5s, stays till 32s, then loop.
function beginTimeline(){
  clearTimers();

  // 9.5s — explode
  timers.push(setTimeout(() => {
    startFragments();
  }, 9500));

  // 21.5s — reappear smooth (9.5 + 12s)
  timers.push(setTimeout(() => {
    if (fragAnimId){ cancelAnimationFrame(fragAnimId); fragAnimId = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = 'none';
    showProfileSmooth();
  }, 21500));

  // 32s — restart cycle (video loops automatically, we just reset music + profile)
  timers.push(setTimeout(() => {
    restartCycle();
  }, 32000));
}

function clearTimers(){ timers.forEach(clearTimeout); timers = []; }

function restartCycle(){
  // Cancel any ongoing fragment animation
  if (fragAnimId){ cancelAnimationFrame(fragAnimId); fragAnimId = null; }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  canvas.style.display = 'none';

  hideProfile();

  // Restart video
  bgVideo.currentTime = 0;
  bgVideo.play().catch(() => {});

  // Restart music if it was playing
  music.currentTime = 0;
  if (isPlaying){
    music.play().catch(() => {});
  }

  setTimeout(() => {
    showProfile();
    beginTimeline();
  }, 60);
}
</script>
</body>
</html>
